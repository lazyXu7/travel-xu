<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交通票务 - Travel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }

    .page-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(22,101,105,0.85) 0%, rgba(10,50,70,0.9) 100%),
                  url('https://images.unsplash.com/photo-1474487548417-781cb71495f3?w=1920&q=80') center/cover no-repeat;
      z-index: -1;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(15px);
      padding: 14px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      z-index: 100;
    }
    .nav-brand { font-size: 1.6rem; font-weight: 700; color: #1a5f7a; text-decoration: none; letter-spacing: 3px; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: #444; text-decoration: none; font-weight: 500;
      padding: 10px 20px; border-radius: 25px;
      transition: all 0.3s; font-size: 0.95rem;
    }
    .nav-links a:hover { background: #1a5f7a; color: white; }
    .nav-links a.active { background: #1a5f7a; color: white; }
    .nav-user { display: flex; align-items: center; gap: 15px; }
    .nav-user .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #1a5f7a, #57c5b6);
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 1.1rem;
    }
    .btn-logout {
      background: #ff6b6b; color: white; border: none; padding: 10px 20px;
      border-radius: 25px; cursor: pointer; font-weight: 500; transition: all 0.3s;
    }
    .btn-logout:hover { background: #ee5a5a; }

    .main-content {
      min-height: 100vh;
      padding: 100px 50px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-header h1 {
      color: white; font-size: 2.5rem; font-weight: 300;
      letter-spacing: 8px; margin-bottom: 10px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .page-header p { color: rgba(255,255,255,0.9); font-size: 1rem; letter-spacing: 2px; }

    /* 票务类型切换 */
    .ticket-tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .ticket-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 50px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 0;
    }
    .ticket-tab:first-child { border-radius: 20px 0 0 20px; }
    .ticket-tab:last-child { border-radius: 0 20px 20px 0; }
    .ticket-tab.active {
      background: rgba(255,255,255,0.95);
      color: #0a8a84;
      border-color: rgba(255,255,255,0.95);
    }
    .ticket-tab .icon { font-size: 2rem; }
    .ticket-tab .title { font-size: 1.1rem; font-weight: 600; }
    .ticket-tab:hover:not(.active) { background: rgba(255,255,255,0.2); }

    /* 查询表单 */
    .search-form {
      max-width: 800px;
      margin: 0 auto 30px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 15px;
      align-items: end;
      margin-bottom: 20px;
    }
    .form-row.single { grid-template-columns: 1fr 1fr; }
    .swap-btn {
      width: 50px; height: 50px;
      background: #f0f9ff;
      border: 2px solid #e0f2fe;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #0a8a84;
      transition: all 0.3s;
    }
    .swap-btn:hover { background: #0a8a84; color: white; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label {
      font-size: 0.9rem; font-weight: 500; color: #555;
      display: flex; align-items: center; gap: 6px;
    }
    .form-group input,
    .form-group select {
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s;
      background: white;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: #0a8a84;
      outline: none;
      box-shadow: 0 0 0 4px rgba(10,138,132,0.1);
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #0d665d, #0a8a84);
      color: white; border: none;
      border-radius: 12px; font-size: 1.1rem;
      font-weight: 600; cursor: pointer;
      transition: all 0.3s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(10,138,132,0.4);
    }
    .submit-btn:disabled {
      background: #ccc; cursor: not-allowed; transform: none;
    }

    /* 结果区域 */
    .result-section {
      max-width: 1000px;
      margin: 0 auto;
      display: none;
      animation: fadeInUp 0.5s ease-out;
    }
    .result-section.active { display: block; }
    .result-header {
      text-align: center;
      margin-bottom: 25px;
    }
    .result-header h2 {
      color: white; font-size: 1.6rem; font-weight: 400;
      text-shadow: 0 2px 15px rgba(0,0,0,0.3);
    }
    .result-header .route {
      font-size: 1.2rem; margin-bottom: 8px;
    }
    .demo-notice {
      display: inline-block;
      background: rgba(255,193,7,0.2);
      border: 1px solid rgba(255,193,7,0.5);
      color: #ffc107;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-top: 10px;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }
    .loading .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 1.1rem; }

    /* 错误提示 */
    .error-msg {
      text-align: center;
      padding: 30px;
      background: rgba(255,107,107,0.2);
      border-radius: 16px;
      color: #ff6b6b;
      max-width: 500px;
      margin: 20px auto;
    }

    /* 票务卡片 */
    .ticket-list { display: flex; flex-direction: column; gap: 15px; }

    .ticket-card {
      background: rgba(255,255,255,0.98);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      transition: all 0.3s;
    }
    .ticket-card { cursor: pointer; }
    .ticket-card:hover { transform: translateY(-3px); box-shadow: 0 15px 50px rgba(0,0,0,0.2); }
    .ticket-card .buy-btn {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white; border: none;
      padding: 8px 16px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.3s;
      white-space: nowrap;
    }
    .ticket-card .buy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(255,107,107,0.4);
    }
    .ticket-card .buy-btn.disabled {
      background: #ccc; cursor: not-allowed;
    }
    .ticket-card .buy-btn.disabled:hover {
      transform: none; box-shadow: none;
    }

    /* 火车卡片 */
    .train-card { display: grid; grid-template-columns: 120px 1fr auto; gap: 20px; align-items: center; }
    .train-info { display: flex; flex-direction: column; gap: 5px; }
    .train-num {
      font-size: 1.2rem; font-weight: 700; color: #0a8a84;
    }
    .train-type {
      font-size: 0.8rem; color: #888;
    }
    .train-route {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .station { text-align: center; }
    .station .time { font-size: 1.4rem; font-weight: 600; color: #333; }
    .station .name { font-size: 0.85rem; color: #666; margin-top: 4px; }
    .route-arrow {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .route-arrow .duration { font-size: 0.8rem; color: #888; }
    .route-arrow .line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #0a8a84, #57c5b6);
      margin-top: 8px;
      position: relative;
    }
    .route-arrow .line::after {
      content: '▶';
      position: absolute;
      right: -2px;
      top: 50%;
      transform: translateY(-50%);
      color: #57c5b6;
      font-size: 0.7rem;
    }

    /* 航班卡片 */
    .flight-card { display: grid; grid-template-columns: 100px 1fr auto; gap: 20px; align-items: center; }
    .flight-logo { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .flight-logo .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #1a5f7a, #57c5b6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 0.8rem;
    }
    .flight-logo .airline { font-size: 0.85rem; color: #666; text-align: center; }
    .flight-logo .flight-no { font-size: 0.75rem; color: #888; }
    .flight-num { font-size: 1rem; font-weight: 600; color: #333; }
    .station .code { font-size: 0.7rem; color: #999; margin-top: 2px; }
    .route-arrow .status { font-size: 0.7rem; color: #4caf50; margin-top: 5px; }

    /* 座位/舱位选择 */
    .seat-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
    }
    .seat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .seat-item:hover { background: #e8f5e9; }
    .seat-item .seat-type { font-size: 0.85rem; color: #666; min-width: 60px; }
    .seat-item .seat-price { font-size: 1rem; font-weight: 700; color: #ff6b6b; }
    .seat-item .seat-left { font-size: 0.75rem; color: #888; min-width: 40px; text-align: right; }
    .seat-item.in-stock .seat-left { color: #2e7d32; }
    .seat-item.low-stock { background: #fff3e0; }
    .seat-item.low-stock .seat-price { color: #ff9800; }
    .seat-item.sold-out { background: #f5f5f5; opacity: 0.5; }
    .seat-item.sold-out .seat-price { color: #999; text-decoration: line-through; }
    .seat-options .buy-btn { margin-top: 8px; }

    /* Toast */
    .toast {
      position: fixed;
      top: 90px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 14px 30px;
      border-radius: 30px;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s;
      font-weight: 500;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #ff6b6b; }
    .toast.info { background: #2196f3; }

    /* 响应式 */
    @media (max-width: 768px) {
      .top-nav { padding: 12px 20px; }
      .nav-brand { font-size: 1.3rem; }
      .nav-links a { padding: 8px 12px; font-size: 0.85rem; }
      .main-content { padding: 90px 20px 40px; }
      .page-header h1 { font-size: 1.8rem; letter-spacing: 4px; }
      .ticket-tabs { flex-direction: column; align-items: center; gap: 10px; }
      .ticket-tab { width: 100%; max-width: 300px; border-radius: 16px !important; }
      .form-row { grid-template-columns: 1fr; }
      .form-row.single { grid-template-columns: 1fr; }
      .swap-btn { display: none; }
      .train-card, .flight-card { grid-template-columns: 1fr; gap: 15px; }
      .train-route { flex-direction: column; gap: 10px; }
      .seat-options { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <a href="/" class="nav-brand">Travel</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/scenic/">旅游推荐</a>
      <a href="/hotel/">酒店推荐</a>
      <a href="/trip/">行程规划</a>
      <a href="/ticket/" class="active">交通票务</a>
      {% if user_id %}
        <div class="nav-user">
          <div class="avatar">{{ username|slice:":1" }}</div>
          <span>{{ username }}</span>
          <a href="/profile/">个人中心</a>
          <button class="btn-logout" onclick="logout()">退出</button>
        </div>
      {% else %}
        <a href="/login/">登录</a>
        <a href="/sign/" style="background: #1a5f7a; color: white;">注册</a>
      {% endif %}
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="main-content">
    <div class="page-header">
      <h1>交通票务</h1>
      <p>火车 · 飞机</p>
    </div>

    <!-- 票务类型切换 -->
    <div class="ticket-tabs">
      <div class="ticket-tab active" onclick="switchTab('train')">
        <span class="icon">🚄</span>
        <span class="title">火车票</span>
      </div>
      <div class="ticket-tab" onclick="switchTab('flight')">
        <span class="icon">✈️</span>
        <span class="title">飞机票</span>
      </div>
    </div>

    <!-- 查询表单 -->
    <div class="search-form">
      <div class="form-row">
        <div class="form-group">
          <label>🚩 出发城市</label>
          <input type="text" id="fromCity" placeholder="如：北京" required>
        </div>
        <button class="swap-btn" onclick="swapCities()" title="交换城市">⇄</button>
        <div class="form-group">
          <label>🏁 到达城市</label>
          <input type="text" id="toCity" placeholder="如：上海" required>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>📅 出发日期</label>
          <input type="date" id="travelDate" required>
        </div>
        <div class="form-group" id="typeGroup" style="display: none;">
          <label>🚃 车次类型</label>
          <select id="trainType">
            <option value="高铁">高铁</option>
            <option value="动车">动车</option>
            <option value="火车">火车</option>
          </select>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="searchBtn" onclick="searchTickets()">
        🔍 查询
      </button>
    </div>

    <!-- 加载状态 -->
    <div class="loading" id="loading" style="display: none;">
      <div class="spinner"></div>
      <p>正在查询<span id="loadingType">列车</span>信息...</p>
    </div>

    <!-- 错误提示 -->
    <div class="error-msg" id="errorMsg" style="display: none;"></div>

    <!-- 查询结果 -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <h2 class="route" id="resultRoute">北京 → 上海</h2>
        <div class="demo-notice" id="demoNotice" style="display: none;">
          ⚠️ 当前为演示数据，请以实际为准
        </div>
      </div>
      <div class="ticket-list" id="ticketList"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let currentType = 'train';
    const typeNames = { train: '列车', flight: '航班' };

    // 设置日期
    const today = new Date();
    document.getElementById('travelDate').min = today.toISOString().split('T')[0];

    // 切换票务类型
    function switchTab(type) {
      currentType = type;
      document.querySelectorAll('.ticket-tab').forEach(t => t.classList.remove('active'));
      event.target.closest('.ticket-tab').classList.add('active');

      // 显示/隐藏车次类型选择
      document.getElementById('typeGroup').style.display = type === 'train' ? 'block' : 'none';

      // 更新表单标题
      const titles = {
        train: { icon: '🚄', text: '查询' },
        flight: { icon: '✈️', text: '查询' }
      };
      document.getElementById('searchBtn').innerHTML = `${titles[type].icon} ${titles[type].text}`;

      // 隐藏结果
      document.getElementById('resultSection').classList.remove('active');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';
    }

    // 交换城市
    function swapCities() {
      const from = document.getElementById('fromCity');
      const to = document.getElementById('toCity');
      const temp = from.value;
      from.value = to.value;
      to.value = temp;
    }

    // 查询票务
    function searchTickets() {
      const fromCity = document.getElementById('fromCity').value.trim();
      const toCity = document.getElementById('toCity').value.trim();
      const date = document.getElementById('travelDate').value;
      const trainType = document.getElementById('trainType').value;

      if (!fromCity || !toCity) {
        showToast('请填写出发地和目的地', 'error');
        return;
      }

      // 显示加载状态
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loadingType').textContent = typeNames[currentType];
      document.getElementById('resultSection').classList.remove('active');
      document.getElementById('errorMsg').style.display = 'none';

      // 构建API URL和参数
      const apis = {
        train: { url: '/ticket/train/search/', method: 'POST', body: { departureCity: fromCity, arrivalCity: toCity, departureDate: date, trainType: trainType } },
        flight: { url: '/ticket/flight/search/', method: 'POST', body: { departureCity: fromCity, arrivalCity: toCity, departureDate: date } }
      };

      const api = apis[currentType];

      fetch(api.url, {
        method: api.method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(api.body)
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';

        if (data.message === '1') {
          const tickets = data.trains || data.flights || [];
          if (tickets.length > 0) {
            renderResults(tickets, fromCity, toCity, data.source === 'demo');
          } else {
            showError('未找到相关票务信息，请尝试其他日期或城市');
          }
        } else {
          showError(data.msg || '查询失败');
        }
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        showError('网络错误，请稍后重试');
      });
    }

    function renderResults(tickets, from, to, isDemo) {
      document.getElementById('resultRoute').textContent = `${from} → ${to}`;
      document.getElementById('demoNotice').style.display = isDemo ? 'inline-block' : 'none';
      document.getElementById('resultSection').classList.add('active');

      const list = document.getElementById('ticketList');

      if (currentType === 'train') {
        list.innerHTML = tickets.map(t => renderTrainCard(t)).join('');
      } else if (currentType === 'flight') {
        list.innerHTML = tickets.map(t => renderFlightCard(t)).join('');
      }
    }

    function renderTrainCard(t) {
      const prices = t.prices || [];
      let pricesHtml = prices.slice(0, 4).map(p => {
        const left = p.left || 0;
        // 处理余票状态：有、无、若干、数字
        let leftDisplay = left;
        let leftClass = 'in-stock';
        if (left === 0 || left === '无' || left === '0') {
          leftClass = 'sold-out';
          leftDisplay = '无票';
        } else if (left === '若干' || left === '有') {
          leftDisplay = '有票';
        } else if (typeof left === 'number' && left < 20) {
          leftClass = 'low-stock';
        }
        return `
          <div class="seat-item ${leftClass}">
            <span class="seat-type">${p.type}</span>
            <span class="seat-price">${p.price ? '¥' + p.price : '--'}</span>
            <span class="seat-left">${leftDisplay}</span>
          </div>
        `;
      }).join('');

      if (pricesHtml === '') {
        pricesHtml = '<div class="seat-item"><span class="seat-type">请查询官网</span></div>';
      }

      // 生成12306购票链接
      const date = document.getElementById('travelDate')?.value || '';
      const trainUrl = `https://kyfw.12306.cn/otn/leftTicket/init?linkparam=true&fs=${encodeURIComponent(t.departStation)},${t.fromCode || ''}&ts=${encodeURIComponent(t.destStation)},${t.toCode || ''}&date=${date}&flag=N,N,N,N`;

      return `
        <div class="ticket-card train-card" onclick="window.open('${trainUrl}', '_blank')">
          <div class="train-info">
            <span class="train-num">${t.trainNum}</span>
            <span class="train-type">${t.trainType}</span>
          </div>
          <div class="train-route">
            <div class="station">
              <div class="time">${t.departTime}</div>
              <div class="name">${t.departStation}</div>
            </div>
            <div class="route-arrow">
              <div class="duration">${t.duration || ''}</div>
              <div class="line"></div>
            </div>
            <div class="station">
              <div class="time">${t.arriveTime}</div>
              <div class="name">${t.destStation}</div>
            </div>
          </div>
          <div class="seat-options" onclick="event.stopPropagation()">
            ${pricesHtml}
            <button class="buy-btn" onclick="window.open('${trainUrl}', '_blank')">
              去购票 →
            </button>
          </div>
        </div>
      `;
    }

    function renderFlightCard(f) {
      const prices = f.prices || [];
      let pricesHtml = prices.slice(0, 3).map(p => {
        const left = p.left || 0;
        const cls = left === 0 ? 'sold-out' : (left < 10 ? 'low-stock' : 'in-stock');
        return `
          <div class="seat-item ${cls}">
            <span class="seat-type">${p.type}</span>
            <span class="seat-price">¥${p.price || '--'}</span>
            <span class="seat-left">${left === 0 ? '售罄' : (left === '有' || left === '若干' ? '有票' : `剩${left}`)}</span>
          </div>
        `;
      }).join('');

      // 如果没有价格数据，显示提示
      if (pricesHtml === '') {
        pricesHtml = '<div class="seat-item"><span class="seat-type">票价请查询官网</span></div>';
      }

      const airlineCode = f.flightNum?.substring(0, 2) || 'CA';
      const departName = f.departAirport || f.departCity || '';
      const arriveName = f.arriveAirport || f.arriveCity || '';

      // 生成机票购买链接
      const flightDate = document.getElementById('travelDate')?.value || '';
      // 携程机票搜索链接
      const fromCode = f.departAirportCode || f.departCity || 'departures';
      const toCode = f.arriveAirportCode || f.arriveCity || 'arrivals';
      const ctripUrl = `https://flights.ctrip.com/international/search/oneway-${encodeURIComponent(fromCode)}-${encodeURIComponent(toCode)}?depdate=${flightDate}&cabin=y_sEconomy`;

      return `
        <div class="ticket-card flight-card" onclick="window.open('${ctripUrl}', '_blank')">
          <div class="flight-logo">
            <div class="logo">${airlineCode}</div>
            <span class="airline">${f.airline || '航空公司'}</span>
            <span class="flight-no">${f.flightNum || ''}</span>
          </div>
          <div class="train-route">
            <div class="station">
              <div class="time">${f.departTime}</div>
              <div class="name">${departName}</div>
              ${f.departAirportCode ? `<div class="code">${f.departAirportCode}</div>` : ''}
            </div>
            <div class="route-arrow">
              <div class="duration">${f.duration || ''}</div>
              <div class="line"></div>
              ${f.state ? `<div class="status">${f.state}</div>` : ''}
            </div>
            <div class="station">
              <div class="time">${f.arriveTime}</div>
              <div class="name">${arriveName}</div>
              ${f.arriveAirportCode ? `<div class="code">${f.arriveAirportCode}</div>` : ''}
            </div>
          </div>
          <div class="seat-options" onclick="event.stopPropagation()">
            ${pricesHtml}
            <button class="buy-btn" onclick="window.open('${ctripUrl}', '_blank')">
              去购票 →
            </button>
          </div>
        </div>
      `;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (type ? ' ' + type : '');
      setTimeout(() => toast.className = 'toast', 3000);
    }

    function logout() { window.location.href = '/logout/'; }

    // 回车搜索
    document.addEventListener('keypress', e => {
      if (e.key === 'Enter' && !document.getElementById('loading').style.display) {
        searchTickets();
      }
    });
  </script>
</body>
</html>
