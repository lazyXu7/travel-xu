<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>景点管理 - Travel后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 0;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }
    .menu { list-style: none; }
    .menu-item {
      padding: 15px 25px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.2); }
    .menu-item.active { background: rgba(255,255,255,0.3); border-left: 4px solid white; }
    .menu-item a { color: white; text-decoration: none; }
    .menu-section { font-size: 0.75rem; color: rgba(255,255,255,0.6); padding: 15px 25px 8px; text-transform: uppercase; }
    .logout-btn {
      position: absolute;
      bottom: 20px;
      left: 25px;
      right: 25px;
      padding: 12px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .main-content { margin-left: 240px; padding: 30px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .page-title { font-size: 1.8rem; font-weight: 700; color: #333; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }

    .toolbar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; }
    .search-input:focus { outline: none; border-color: #667eea; }
    .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover { opacity: 0.9; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 15px;
      background: #f8f9fa;
      color: #333;
      font-weight: 600;
      border-bottom: 2px solid #e0e0e0;
    }
    .data-table td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
    .data-table tr:hover { background: #f8f9fa; }
    .scenic-name { font-weight: 600; color: #333; }
    .score { color: #ffc107; font-weight: 600; }
    .popularity { color: #ff6b6b; }

    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .page-btn { padding: 8px 15px; border: 1px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; }
    .page-btn:hover { background: #f5f5f5; }
    .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .page-info { padding: 8px 15px; color: #888; }
    .loading { text-align: center; padding: 50px; color: #888; }

    /* 模态框 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 15px; }
    .form-label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9rem; }
    .form-input { width: 100%; padding: 10px 15px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
    .form-input:focus { outline: none; border-color: #667eea; }
    textarea.form-input { resize: vertical; min-height: 80px; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: #e0e0e0; color: #333; }
    .btn-cancel:hover { background: #d0d0d0; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">后台管理</div>
    <ul class="menu">
      <li class="menu-section">主菜单</li>
      <li class="menu-item"><span>📊</span><a href="/admin/dashboard/">控制台</a></li>
      <li class="menu-section">用户管理</li>
      <li class="menu-item"><span>👥</span><a href="/admin/users/">用户列表</a></li>
      <li class="menu-item"><span>💬</span><a href="/admin/comments/">评论管理</a></li>
      <li class="menu-section">业务管理</li>
      <li class="menu-item"><span>📋</span><a href="/admin/orders/">订单管理</a></li>
      <li class="menu-item"><span>🏨</span><a href="/admin/hotels/">酒店管理</a></li>
      <li class="menu-item active"><span>🏞️</span><a href="/admin/scenics/">景点管理</a></li>
    </ul>
    <button class="logout-btn" onclick="logout()">← 退出登录</button>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">景点管理</h1>
    </div>

    <div class="card">
      <div class="toolbar">
        <input type="text" class="search-input" id="keyword" placeholder="搜索景点名称..." onkeyup="handleEnter(event)">
        <button class="btn btn-primary" onclick="loadScenics(1)">🔍 搜索</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ 添加景点</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>景点名称</th>
            <th>所在城市</th>
            <th>评分</th>
            <th>热度</th>
            <th>开放时间</th>
            <th>评论数</th>
            <th>收藏数</th>
          </tr>
        </thead>
        <tbody id="scenicTable">
          <tr><td colspan="7" class="loading">加载中...</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 添加景点模态框 -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-title">添加景点</div>
      <form id="addForm">
        <div class="form-group">
          <label class="form-label">景点名称 *</label>
          <input type="text" class="form-input" name="name" required placeholder="如：故宫博物院">
        </div>
        <div class="form-group">
          <label class="form-label">所在城市</label>
          <input type="text" class="form-input" name="city" placeholder="如：北京">
        </div>
        <div class="form-group">
          <label class="form-label">地址</label>
          <input type="text" class="form-input" name="address" placeholder="详细地址">
        </div>
        <div class="form-group">
          <label class="form-label">评分</label>
          <input type="number" class="form-input" name="score" step="0.1" min="0" max="5" value="4.5" placeholder="4.5">
        </div>
        <div class="form-group">
          <label class="form-label">热度值</label>
          <input type="number" class="form-input" name="popularity" value="1000" placeholder="热度值">
        </div>
        <div class="form-group">
          <label class="form-label">开放时间</label>
          <input type="text" class="form-input" name="open_time" placeholder="如：08:00-18:00">
        </div>
        <div class="form-group">
          <label class="form-label">景点介绍</label>
          <textarea class="form-input" name="introduce" placeholder="景点简介..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">图片URL</label>
          <input type="text" class="form-input" name="pic_url" placeholder="图片链接">
        </div>
        <div class="modal-btns">
          <button type="button" class="btn btn-cancel" onclick="closeAddModal()">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentPage = 1;

    async function loadScenics(page) {
      currentPage = page;
      const keyword = document.getElementById('keyword').value;
      const tbody = document.getElementById('scenicTable');
      tbody.innerHTML = '<tr><td colspan="7" class="loading">加载中...</td></tr>';

      try {
        const res = await fetch(`/admin/scenics/data/?page=${page}&page_size=10&keyword=${encodeURIComponent(keyword)}`);
        const data = await res.json();

        if (data.status === 'success') {
          const { list, total, page_size } = data.data;

          if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
          }

          tbody.innerHTML = list.map(s => `
            <tr>
              <td class="scenic-name">${s.SZ_name}</td>
              <td>${s.SZ_city || '-'}</td>
              <td class="score">⭐ ${s.SZ_score ? s.SZ_score.toFixed(1) : '-'}</td>
              <td class="popularity">🔥 ${s.SZ_popularity || 0}</td>
              <td>${s.SZ_time || '-'}</td>
              <td>${s.comment_count}</td>
              <td>${s.favorite_count}</td>
            </tr>
          `).join('');

          renderPagination(total, page, page_size);
        } else {
          tbody.innerHTML = '<tr><td colspan="7" class="loading">加载失败</td></tr>';
        }
      } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="7" class="loading">加载失败</td></tr>';
      }
    }

    function handleEnter(e) {
      if (e.key === 'Enter') loadScenics(1);
    }

    function renderPagination(total, page, pageSize) {
      const totalPages = Math.ceil(total / pageSize);
      let html = '';
      html += `<button class="page-btn" onclick="loadScenics(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadScenics(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += '<span style="padding: 8px;">...</span>';
        }
      }
      html += `<button class="page-btn" onclick="loadScenics(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
      html += `<span class="page-info">共 ${total} 条</span>`;
      document.getElementById('pagination').innerHTML = html;
    }

    function openAddModal() {
      document.getElementById('addModal').classList.add('show');
      document.getElementById('addForm').reset();
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('show');
    }

    document.getElementById('addForm').onsubmit = async function(e) {
      e.preventDefault();
      const formData = new FormData(this);

      try {
        const res = await fetch('/admin/scenics/add/', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (data.status === 'success') {
          alert('添加成功');
          closeAddModal();
          loadScenics(1);
        } else {
          alert(data.message || '添加失败');
        }
      } catch (err) {
        alert('操作失败');
      }
    };

    function logout() {
      if (confirm('确定要退出登录吗？')) {
        window.location.href = '/admin/logout/';
      }
    }

    loadScenics(1);
  </script>
</body>
</html>
