<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单管理 - Travel后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 0;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }
    .menu { list-style: none; }
    .menu-item {
      padding: 15px 25px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.2); }
    .menu-item.active { background: rgba(255,255,255,0.3); border-left: 4px solid white; }
    .menu-item a { color: white; text-decoration: none; }
    .menu-section { font-size: 0.75rem; color: rgba(255,255,255,0.6); padding: 15px 25px 8px; text-transform: uppercase; }
    .logout-btn {
      position: absolute;
      bottom: 20px;
      left: 25px;
      right: 25px;
      padding: 12px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .main-content { margin-left: 240px; padding: 30px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .page-title { font-size: 1.8rem; font-weight: 700; color: #333; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }

    .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .filter-tab { padding: 8px 20px; border: none; background: #f0f0f0; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
    .filter-tab.active { background: #667eea; color: white; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 15px;
      background: #f8f9fa;
      color: #333;
      font-weight: 600;
      border-bottom: 2px solid #e0e0e0;
    }
    .data-table td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
    .data-table tr:hover { background: #f8f9fa; }
    .order-no { font-family: monospace; color: #667eea; }
    .price { color: #ff6b6b; font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .badge-paid { background: #e8f5e9; color: #2e7d32; }
    .badge-cancelled { background: #ffebee; color: #c62828; }
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-right: 5px;
    }
    .btn-warning { background: #fff3e0; color: #e65100; }
    .btn-warning:hover { background: #ffe0b2; }

    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .page-btn { padding: 8px 15px; border: 1px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; }
    .page-btn:hover { background: #f5f5f5; }
    .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .page-info { padding: 8px 15px; color: #888; }
    .loading { text-align: center; padding: 50px; color: #888; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">🎛️ 后台管理</div>
    <ul class="menu">
      <li class="menu-section">主菜单</li>
      <li class="menu-item"><span>📊</span><a href="/admin/dashboard/">控制台</a></li>
      <li class="menu-section">用户管理</li>
      <li class="menu-item"><span>👥</span><a href="/admin/users/">用户列表</a></li>
      <li class="menu-item"><span>💬</span><a href="/admin/comments/">评论管理</a></li>
      <li class="menu-section">业务管理</li>
      <li class="menu-item active"><span>📋</span><a href="/admin/orders/">订单管理</a></li>
      <li class="menu-item"><span>🏨</span><a href="/admin/hotels/">酒店管理</a></li>
      <li class="menu-item"><span>🏞️</span><a href="/admin/scenics/">景点管理</a></li>
    </ul>
    <button class="logout-btn" onclick="logout()">← 退出登录</button>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">订单管理</h1>
    </div>

    <div class="card">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('')">全部</button>
        <button class="filter-tab" onclick="setFilter('paid')">已支付</button>
        <button class="filter-tab" onclick="setFilter('cancelled')">已取消</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>订单号</th>
            <th>用户</th>
            <th>酒店</th>
            <th>入住/退房</th>
            <th>房间数</th>
            <th>总价</th>
            <th>支付方式</th>
            <th>状态</th>
            <th>下单时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="orderTable">
          <tr><td colspan="10" class="loading">加载中...</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentFilter = '';

    async function loadOrders(page) {
      currentPage = page;
      const tbody = document.getElementById('orderTable');
      tbody.innerHTML = '<tr><td colspan="10" class="loading">加载中...</td></tr>';

      try {
        const res = await fetch(`/admin/orders/data/?page=${page}&page_size=10&status=${currentFilter}`);
        const data = await res.json();

        if (data.status === 'success') {
          const { list, total, page_size } = data.data;

          if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="loading">暂无数据</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
          }

          tbody.innerHTML = list.map(o => `
            <tr>
              <td class="order-no">${o.order_no}</td>
              <td>${o.user_name}</td>
              <td>${o.hotel_name}</td>
              <td>${o.checkin_date} / ${o.checkout_date}</td>
              <td>${o.room_count}</td>
              <td class="price">¥${o.total_price.toFixed(2)}</td>
              <td>${o.payment_method === 'alipay' ? '支付宝' : o.payment_method === 'wechat' ? '微信' : '银行卡'}</td>
              <td><span class="badge ${o.status === 'paid' ? 'badge-paid' : 'badge-cancelled'}">${o.status === 'paid' ? '已支付' : '已取消'}</span></td>
              <td>${o.create_time}</td>
              <td>
                ${o.status === 'paid' ? `<button class="action-btn btn-warning" onclick="updateStatus(${o.OID}, 'cancelled')">取消</button>` : ''}
              </td>
            </tr>
          `).join('');

          const totalPages = Math.ceil(total / page_size);
          renderPagination(total, page, page_size);
        }
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="10" class="loading">加载失败</td></tr>';
      }
    }

    function setFilter(status) {
      currentFilter = status;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadOrders(1);
    }

    function renderPagination(total, page, pageSize) {
      const totalPages = Math.ceil(total / pageSize);
      let html = '';
      html += `<button class="page-btn" onclick="loadOrders(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadOrders(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += '<span style="padding: 8px;">...</span>';
        }
      }
      html += `<button class="page-btn" onclick="loadOrders(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
      html += `<span class="page-info">共 ${total} 条</span>`;
      document.getElementById('pagination').innerHTML = html;
    }

    async function updateStatus(orderId, status) {
      if (!confirm('确定要更新订单状态吗？')) return;

      try {
        const formData = new FormData();
        formData.append('order_id', orderId);
        formData.append('status', status);

        const res = await fetch('/admin/orders/update/', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (data.status === 'success') {
          alert('更新成功');
          loadOrders(currentPage);
        } else {
          alert('更新失败: ' + data.message);
        }
      } catch (err) {
        alert('操作失败');
      }
    }

    function logout() {
      if (confirm('确定要退出登录吗？')) {
        window.location.href = '/admin/logout/';
      }
    }

    loadOrders(1);
  </script>
</body>
</html>
