<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>评论管理 - Travel后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 0;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }
    .menu { list-style: none; }
    .menu-item {
      padding: 15px 25px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.2); }
    .menu-item.active { background: rgba(255,255,255,0.3); border-left: 4px solid white; }
    .menu-item a { color: white; text-decoration: none; }
    .menu-section { font-size: 0.75rem; color: rgba(255,255,255,0.6); padding: 15px 25px 8px; text-transform: uppercase; }
    .logout-btn {
      position: absolute;
      bottom: 20px;
      left: 25px;
      right: 25px;
      padding: 12px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .main-content { margin-left: 240px; padding: 30px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .page-title { font-size: 1.8rem; font-weight: 700; color: #333; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }

    .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .filter-tab {
      padding: 8px 20px;
      border: none;
      background: #f0f0f0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .filter-tab.active { background: #667eea; color: white; }

    .comment-item {
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .comment-user { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .comment-meta { font-size: 0.85rem; color: #888; }
    .comment-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
    }
    .badge-scenic { background: #e8f5e9; color: #2e7d32; }
    .badge-hotel { background: #e3f2fd; color: #1565c0; }
    .comment-content {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      line-height: 1.6;
    }
    .comment-footer { display: flex; justify-content: space-between; align-items: center; }
    .comment-target { font-size: 0.85rem; color: #666; }
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-danger { background: #ffebee; color: #c62828; }
    .btn-danger:hover { background: #ffcdd2; }

    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .page-btn { padding: 8px 15px; border: 1px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; }
    .page-btn:hover { background: #f5f5f5; }
    .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .page-info { padding: 8px 15px; color: #888; }
    .loading { text-align: center; padding: 50px; color: #888; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">🎛️ 后台管理</div>
    <ul class="menu">
      <li class="menu-section">主菜单</li>
      <li class="menu-item"><span>📊</span><a href="/admin/dashboard/">控制台</a></li>
      <li class="menu-section">用户管理</li>
      <li class="menu-item"><span>👥</span><a href="/admin/users/">用户列表</a></li>
      <li class="menu-item active"><span>💬</span><a href="/admin/comments/">评论管理</a></li>
      <li class="menu-section">业务管理</li>
      <li class="menu-item"><span>📋</span><a href="/admin/orders/">订单管理</a></li>
      <li class="menu-item"><span>🏨</span><a href="/admin/hotels/">酒店管理</a></li>
      <li class="menu-item"><span>🏞️</span><a href="/admin/scenics/">景点管理</a></li>
    </ul>
    <button class="logout-btn" onclick="logout()">← 退出登录</button>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">评论管理</h1>
    </div>

    <div class="card">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all')">全部</button>
        <button class="filter-tab" onclick="setFilter('scenic')">景点评论</button>
        <button class="filter-tab" onclick="setFilter('hotel')">酒店评论</button>
      </div>

      <div id="commentList">
        <div class="loading">加载中...</div>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentFilter = 'all';

    async function loadComments(page) {
      currentPage = page;
      const list = document.getElementById('commentList');
      list.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(`/admin/comments/data/?page=${page}&page_size=10&type=${currentFilter}`);
        const data = await res.json();

        if (data.status === 'success') {
          const { list: comments, total, page: p, page_size } = data.data;

          if (comments.length === 0) {
            list.innerHTML = '<div class="loading">暂无数据</div>';
            document.getElementById('pagination').innerHTML = '';
            return;
          }

          list.innerHTML = comments.map(c => `
            <div class="comment-item">
              <div class="comment-header">
                <div class="comment-user">
                  <div class="user-avatar">${c.user_name.charAt(0).toUpperCase()}</div>
                  <div>
                    <div style="font-weight: 600;">${c.user_name}</div>
                    <div class="comment-meta">${c.time}</div>
                  </div>
                </div>
                <span class="comment-badge ${c.type === 'scenic' ? 'badge-scenic' : 'badge-hotel'}">
                  ${c.type === 'scenic' ? '🏞️ 景点' : '🏨 酒店'}
                </span>
              </div>
              <div class="comment-content">${c.content}</div>
              <div class="comment-footer">
                <span class="comment-target">评论于：${c.target_name}</span>
                <button class="action-btn btn-danger" onclick="deleteComment(${c.id}, '${c.type}')">删除</button>
              </div>
            </div>
          `).join('');

          const totalPages = Math.ceil(total / page_size);
          renderPagination(total, page, page_size);
        }
      } catch (err) {
        list.innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    function setFilter(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadComments(1);
    }

    function renderPagination(total, page, pageSize) {
      const totalPages = Math.ceil(total / pageSize);
      let html = '';
      html += `<button class="page-btn" onclick="loadComments(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadComments(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += '<span style="padding: 8px;">...</span>';
        }
      }
      html += `<button class="page-btn" onclick="loadComments(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
      html += `<span class="page-info">共 ${total} 条</span>`;
      document.getElementById('pagination').innerHTML = html;
    }

    async function deleteComment(id, type) {
      if (!confirm('确定要删除该评论吗？')) return;

      try {
        const formData = new FormData();
        formData.append('comment_id', id);
        formData.append('type', type);

        const res = await fetch('/admin/comments/delete/', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (data.status === 'success') {
          alert('删除成功');
          loadComments(currentPage);
        } else {
          alert('删除失败: ' + data.message);
        }
      } catch (err) {
        alert('操作失败');
      }
    }

    function logout() {
      if (confirm('确定要退出登录吗？')) {
        window.location.href = '/admin/logout/';
      }
    }

    loadComments(1);
  </script>
</body>
</html>
