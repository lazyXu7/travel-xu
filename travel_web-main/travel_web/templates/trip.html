<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能行程规划 - Travel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }

    /* 全屏背景 - 旅行/地图 */
    .page-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(15,32,56,0.88) 0%, rgba(26,54,95,0.9) 100%),
                  url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1920&q=80') center/cover no-repeat;
      z-index: -1;
    }

    /* 顶部导航 */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(15px);
      padding: 14px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      z-index: 100;
    }
    .nav-brand {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ff6b6b;
      text-decoration: none;
      letter-spacing: 3px;
    }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: #444;
      text-decoration: none;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 25px;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .nav-links a:hover { background: #ff6b6b; color: white; }
    .nav-links a.active { background: #ff6b6b; color: white; }
    .nav-user { display: flex; align-items: center; gap: 15px; }
    .nav-user .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #ffa07a);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 1.1rem;
    }
    .btn-logout {
      background: #ff6b6b; color: white; border: none; padding: 10px 20px;
      border-radius: 25px; cursor: pointer; font-weight: 500;
      transition: all 0.3s;
    }
    .btn-logout:hover { background: #ee5a5a; }

    /* 主内容 */
    .main-content {
      min-height: 100vh;
      padding: 100px 50px 60px;
    }

    /* 页面标题 */
    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-header h1 {
      color: white;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 8px;
      margin-bottom: 12px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .page-header p {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    /* 搜索/筛选区域 */
    .filter-section {
      max-width: 900px;
      margin: 0 auto 40px;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .filter-box {
      background: rgba(255,255,255,0.98);
      border-radius: 24px;
      padding: 30px 35px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    }
    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-group label {
      font-size: 0.85rem;
      color: #666;
      font-weight: 500;
    }
    .filter-group select,
    .filter-group input {
      padding: 14px 18px;
      border: 2px solid #eee;
      border-radius: 14px;
      font-size: 15px;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.3s;
    }
    .filter-group select:focus,
    .filter-group input:focus {
      border-color: #ff6b6b;
      background: white;
      outline: none;
    }

    /* 偏好标签 */
    .preference-section {
      margin-bottom: 25px;
    }
    .preference-section label {
      font-size: 0.85rem;
      color: #666;
      font-weight: 500;
      margin-bottom: 12px;
      display: block;
    }
    .preference-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pref-tag {
      padding: 10px 20px;
      border: 2px solid #eee;
      border-radius: 25px;
      background: transparent;
      color: #666;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: 500;
    }
    .pref-tag:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }
    .pref-tag.active {
      background: linear-gradient(135deg, #ff6b6b, #ffa07a);
      border-color: #ff6b6b;
      color: white;
    }

    /* 按钮 */
    .btn-generate {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.4);
    }
    .btn-generate:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* 结果区域 */
    .result-section {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* 结果头部统计 */
    .result-header {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 25px 35px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      animation: fadeInUp 0.6s ease-out;
    }
    .result-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
    }
    .result-title span {
      color: #ff6b6b;
    }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-icon {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    .stat-icon.days { background: #fff0f0; color: #ff6b6b; }
    .stat-icon.scenics { background: #e8f5e9; color: #4caf50; }
    .stat-icon.budget { background: #fff8e1; color: #ffa726; }
    .stat-icon.travel { background: #e3f2fd; color: #42a5f5; }
    .stat-info .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
    }
    .stat-info .stat-label {
      font-size: 0.8rem;
      color: #999;
    }

    /* 每天行程卡片 */
    .day-card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      margin-bottom: 30px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      animation: fadeInUp 0.6s ease-out;
    }
    .day-card-header {
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .day-title {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .day-badge {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .day-badge span:first-child { font-size: 0.75rem; opacity: 0.9; }
    .day-badge span:last-child { font-size: 1.3rem; }
    .day-info h3 {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }
    .day-info p {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .day-stats {
      display: flex;
      gap: 20px;
    }
    .day-stat {
      text-align: center;
      padding: 8px 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
    }
    .day-stat-value { font-size: 1.2rem; font-weight: 700; }
    .day-stat-label { font-size: 0.75rem; opacity: 0.9; }

    /* 景点列表 */
    .scenic-list {
      padding: 25px 30px;
    }

    .scenic-item {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px dashed #eee;
      position: relative;
    }
    .scenic-item:last-child {
      border-bottom: none;
    }

    /* 时间标记 */
    .time-marker {
      min-width: 75px;
      text-align: center;
    }
    .time-box {
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
      padding: 12px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .time-box .time {
      font-size: 1.1rem;
    }
    .time-box .duration {
      font-size: 0.75rem;
      opacity: 0.9;
      margin-top: 3px;
    }

    /* 景点内容 */
    .scenic-content {
      flex: 1;
    }
    .scenic-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .scenic-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 10px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: #666;
    }
    .meta-item i {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .meta-item.score i { background: #fff3e0; color: #ffa726; }
    .meta-item.address i { background: #fce4ec; color: #ff6b6b; }
    .meta-item.time i { background: #e8f5e9; color: #4caf50; }

    .scenic-address {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .scenic-address i { color: #ff6b6b; margin-top: 3px; }

    .scenic-tips {
      background: #fff9c4;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #795548;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .scenic-tips i { color: #ffc107; margin-top: 2px; }

    /* 交通信息 */
    .transport-info {
      background: #f8f9fa;
      padding: 12px 16px;
      border-radius: 10px;
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }
    .transport-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #666;
    }
    .transport-item i { color: #ff6b6b; }

    .scenic-price-tag {
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      color: #e65100;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-left: auto;
    }

    /* 右侧交通指示 */
    .transport-indicator {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .transport-badge {
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(255,107,107,0.3);
    }
    .transport-line {
      width: 3px;
      height: 40px;
      background: linear-gradient(to bottom, #ff6b6b, #ffa07a);
      border-radius: 2px;
    }

    /* 操作按钮 */
    .result-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }
    .btn-action {
      padding: 14px 35px;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-save {
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
    }
    .btn-save:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.4);
    }
    .btn-reset {
      background: #f5f5f5;
      color: #666;
    }
    .btn-reset:hover {
      background: #e0e0e0;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }
    .loading .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 1.1rem; letter-spacing: 2px; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: white;
      animation: fadeInUp 0.8s ease-out;
    }
    .empty-state i {
      font-size: 5rem;
      margin-bottom: 25px;
      opacity: 0.6;
    }
    .empty-state h3 {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }
    .empty-state p {
      font-size: 1rem;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    /* 提示消息 */
    .toast {
      position: fixed;
      top: 100px;
      right: 30px;
      padding: 16px 28px;
      border-radius: 14px;
      color: white;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.4s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .toast.success { background: linear-gradient(135deg, #4caf50, #66bb6a); }
    .toast.error { background: linear-gradient(135deg, #f44336, #ef5350); }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .top-nav { padding: 12px 20px; }
      .nav-brand { font-size: 1.3rem; }
      .nav-links a { padding: 8px 12px; font-size: 0.85rem; }
      .main-content { padding: 90px 20px 40px; }
      .page-header h1 { font-size: 2rem; letter-spacing: 4px; }
      .filter-row { grid-template-columns: 1fr; }
      .day-card-header { flex-direction: column; gap: 15px; text-align: center; }
      .day-stats { justify-content: center; }
      .scenic-item { flex-direction: column; }
      .transport-indicator { display: none; }
      .result-actions { flex-direction: column; }
      .btn-action { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <a href="/" class="nav-brand">Travel</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/scenic/">旅游推荐</a>
      <a href="/hotel/">酒店推荐</a>
      <a href="/trip/" class="active">行程规划</a>
      <a href="/ticket/">交通票务</a>
      {% if user_id %}
        <div class="nav-user">
          <div class="avatar">{{ username|slice:":1" }}</div>
          <span>{{ username }}</span>
          <a href="/profile/">个人中心</a>
          <button class="btn-logout" onclick="logout()">退出</button>
        </div>
      {% else %}
        <a href="/login/">登录</a>
        <a href="/sign/" style="background: #ff6b6b; color: white;">注册</a>
      {% endif %}
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="main-content">
    <!-- 页面标题 -->
    <div class="page-header">
      <h1>智能行程规划</h1>
      <p>AI 驱动的个性化旅行路线</p>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-section">
      <div class="filter-box">
        <div class="filter-row">
          <div class="filter-group">
            <label><i class="fas fa-map-marker-alt"></i> 目的地</label>
            <select id="citySelect" required>
              <option value="">选择城市</option>
              <option value="北京">北京</option>
              <option value="上海">上海</option>
              <option value="广州">广州</option>
              <option value="深圳">深圳</option>
              <option value="杭州">杭州</option>
              <option value="成都">成都</option>
              <option value="重庆">重庆</option>
              <option value="西安">西安</option>
              <option value="苏州">苏州</option>
              <option value="南京">南京</option>
              <option value="厦门">厦门</option>
              <option value="青岛">青岛</option>
              <option value="武汉">武汉</option>
              <option value="长沙">长沙</option>
              <option value="昆明">昆明</option>
            </select>
          </div>
          <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> 游玩天数</label>
            <select id="daysSelect">
              <option value="1">1天</option>
              <option value="2">2天</option>
              <option value="3" selected>3天</option>
              <option value="4">4天</option>
              <option value="5">5天</option>
              <option value="6">6天</option>
              <option value="7">7天</option>
            </select>
          </div>
          <div class="filter-group">
            <label><i class="fas fa-calendar-check"></i> 出游日期</label>
            <input type="date" id="startDate">
          </div>
        </div>

        <div class="preference-section">
          <label>出游偏好（可选）</label>
          <div class="preference-tags">
            <button type="button" class="pref-tag active" data-value="">不限制</button>
            <button type="button" class="pref-tag" data-value="亲子"><i class="fas fa-child"></i> 亲子游</button>
            <button type="button" class="pref-tag" data-value="情侣"><i class="fas fa-heart"></i> 情侣游</button>
            <button type="button" class="pref-tag" data-value="独自"><i class="fas fa-user"></i> 独自旅行</button>
            <button type="button" class="pref-tag" data-value="摄影"><i class="fas fa-camera"></i> 摄影爱好者</button>
            <button type="button" class="pref-tag" data-value="美食"><i class="fas fa-utensils"></i> 美食之旅</button>
          </div>
        </div>

        <button type="submit" class="btn-generate" id="generateBtn">
          <i class="fas fa-magic"></i> 生成专属行程
        </button>
      </div>
    </div>

    <!-- 结果区域 -->
    <div class="result-section" id="resultSection">
      <!-- 空状态 -->
      <div class="empty-state" id="emptyState">
        <i class="fas fa-route"></i>
        <h3>开始规划你的旅程</h3>
        <p>选择目的地和天数，AI 将为你生成最优路线</p>
      </div>

      <!-- 加载中 -->
      <div class="loading" id="loadingState" style="display: none;">
        <div class="spinner"></div>
        <p>正在生成最佳路线...</p>
      </div>

      <!-- 结果内容 -->
      <div id="resultContent" style="display: none;"></div>
    </div>
  </div>

  <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    $(function() {
      // 设置默认日期
      const today = new Date().toISOString().split('T')[0];
      $('#startDate').val(today);
      $('#startDate').attr('min', today);

      // 偏好标签选择
      $('.pref-tag').click(function() {
        $('.pref-tag').removeClass('active');
        $(this).addClass('active');
      });

      // 生成行程
      $('#generateBtn').click(function() {
        const city = $('#citySelect').val();
        const days = $('#daysSelect').val();
        const startDate = $('#startDate').val();
        const preference = $('.pref-tag.active').data('value') || '';

        if (!city) {
          showToast('请选择目的地城市', 'error');
          return;
        }

        $('#emptyState').hide();
        $('#resultContent').hide();
        $('#loadingState').show();
        $('#generateBtn').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 生成中...');

        $.ajax({
          url: '/api/trip/plan/',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({
            city: city,
            days: parseInt(days),
            start_date: startDate,
            preference: preference
          }),
          success: function(res) {
            $('#loadingState').hide();
            $('#generateBtn').prop('disabled', false).html('<i class="fas fa-magic"></i> 生成专属行程');

            if (res.message == '1') {
              renderResult(res);
            } else {
              showToast(res.msg || '生成失败', 'error');
              $('#emptyState').show();
            }
          },
          error: function() {
            $('#loadingState').hide();
            $('#generateBtn').prop('disabled', false).html('<i class="fas fa-magic"></i> 生成专属行程');
            showToast('网络错误，请稍后重试', 'error');
          }
        });
      });

      // 渲染结果
      function renderResult(data) {
        const itinerary = data.itinerary || [];
        let totalScenics = 0;
        let totalBudget = 0;
        let totalTravelTime = 0;

        itinerary.forEach(day => {
          totalScenics += day.scenics?.length || 0;
          totalBudget += day.total_budget || 0;
          totalTravelTime += day.travel_time_total || 0;
        });

        let html = `
          <div class="result-header">
            <div class="result-title">📍 <span>${data.city}</span> · ${data.days}天行程规划</div>
            <div class="stats-row">
              <div class="stat-item">
                <div class="stat-icon days"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info">
                  <div class="stat-value">${data.days}天</div>
                  <div class="stat-label">游玩天数</div>
                </div>
              </div>
              <div class="stat-item">
                <div class="stat-icon scenics"><i class="fas fa-camera"></i></div>
                <div class="stat-info">
                  <div class="stat-value">${totalScenics}个</div>
                  <div class="stat-label">景点数量</div>
                </div>
              </div>
              <div class="stat-item">
                <div class="stat-icon budget"><i class="fas fa-ticket-alt"></i></div>
                <div class="stat-info">
                  <div class="stat-value">¥${totalBudget}</div>
                  <div class="stat-label">预算(门票)</div>
                </div>
              </div>
              <div class="stat-item">
                <div class="stat-icon travel"><i class="fas fa-car"></i></div>
                <div class="stat-info">
                  <div class="stat-value">${totalTravelTime}分钟</div>
                  <div class="stat-label">交通时间</div>
                </div>
              </div>
            </div>
          </div>
        `;

        // 每天行程
        itinerary.forEach((day, dayIndex) => {
          const dateObj = new Date(day.date);
          const weekDay = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][dateObj.getDay()];

          html += `
            <div class="day-card" style="animation-delay: ${dayIndex * 0.1}s">
              <div class="day-card-header">
                <div class="day-title">
                  <div class="day-badge">
                    <span>Day</span>
                    <span>${day.day}</span>
                  </div>
                  <div class="day-info">
                    <h3>${day.date} ${weekDay}</h3>
                    <p>${day.scenics?.length || 0}个景点 · ${day.total_hours}小时 · 门票¥${day.total_budget}</p>
                  </div>
                </div>
                <div class="day-stats">
                  <div class="day-stat">
                    <div class="day-stat-value">${day.total_hours}h</div>
                    <div class="day-stat-label">游玩</div>
                  </div>
                  <div class="day-stat">
                    <div class="day-stat-value">${day.travel_time_total || 0}m</div>
                    <div class="day-stat-label">交通</div>
                  </div>
                </div>
              </div>
              <div class="scenic-list">
          `;

          (day.scenics || []).forEach((scenic, index) => {
            const isLastScenic = index === day.scenics.length - 1;

            html += `
              <div class="scenic-item">
                <div class="time-marker">
                  <div class="time-box">
                    <div class="time">${scenic.start}</div>
                    <div class="duration">${scenic.duration}h</div>
                  </div>
                </div>
                <div class="scenic-content">
                  <div class="scenic-name">${index + 1}. ${scenic.name}</div>
                  <div class="scenic-meta">
                    <span class="meta-item score"><i class="fas fa-star"></i> ${scenic.score}分</span>
                    ${scenic.address ? `<span class="meta-item address"><i class="fas fa-map-marker-alt"></i> ${scenic.address}</span>` : ''}
                    <span class="meta-item time"><i class="fas fa-clock"></i> 建议${scenic.duration}小时</span>
                  </div>
                  ${scenic.tips ? `<div class="scenic-tips"><i class="fas fa-lightbulb"></i> ${scenic.tips}</div>` : ''}
                  ${!isLastScenic ? `
                  <div class="transport-info">
                    <div class="transport-item">
                      <i class="fas fa-route"></i>
                      ${scenic.transport || '自驾前往'}
                    </div>
                    ${scenic.distance ? `
                    <div class="transport-item">
                      <i class="fas fa-road"></i>
                      ${scenic.distance}
                    </div>
                    ` : ''}
                    <div class="transport-item">
                      <i class="fas fa-clock"></i>
                      约${scenic.travel_minutes || 0}分钟
                    </div>
                  </div>
                  ` : ''}
                </div>
                <span class="scenic-price-tag"><i class="fas fa-ticket-alt"></i> ¥${scenic.ticket_price}</span>
                ${!isLastScenic ? `
                <div class="transport-indicator">
                  <div class="transport-badge">
                    <i class="fas fa-car"></i> ${scenic.travel_minutes || 0}分钟
                  </div>
                  <div class="transport-line"></div>
                </div>
                ` : ''}
              </div>
            `;
          });

          html += `</div></div>`;
        });

        // 操作按钮
        html += `
          <div class="result-actions">
            <button class="btn-action btn-save" onclick="saveItinerary()">
              <i class="fas fa-bookmark"></i> 保存行程
            </button>
            <button class="btn-action btn-reset" onclick="location.reload()">
              <i class="fas fa-redo"></i> 重新规划
            </button>
          </div>
        `;

        $('#resultContent').html(html).show();
      }

      // 保存行程
      window.saveItinerary = function() {
        const city = $('#citySelect').val();
        const days = $('#daysSelect').val();
        const itinerary = window.currentItinerary;

        $.ajax({
          url: '/api/trip/save/',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ city, days, itinerary }),
          success: function(res) {
            if (res.message == '1') {
              showToast('行程已保存到个人中心', 'success');
            } else {
              showToast(res.msg || '保存失败', 'error');
            }
          },
          error: function() {
            showToast('请先登录', 'error');
          }
        });
      };

      // 提示消息
      function showToast(message, type) {
        const toast = $(`<div class="toast ${type}">${message}</div>`);
        $('body').append(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      function logout() {
        window.location.href = '/logout/';
      }
    });
  </script>
</body>
</html>
