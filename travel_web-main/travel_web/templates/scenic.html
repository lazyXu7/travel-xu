<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>旅游推荐 - Travel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }

    /* 全屏背景 - 山水风景 */
    .page-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(46,125,177,0.85) 0%, rgba(27,56,101,0.9) 100%),
                  url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=80') center/cover no-repeat;
      z-index: -1;
    }

    /* 顶部导航 */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(15px);
      padding: 14px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      z-index: 100;
    }
    .nav-brand {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a5f7a;
      text-decoration: none;
      letter-spacing: 3px;
    }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: #444;
      text-decoration: none;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 25px;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .nav-links a:hover { background: #1a5f7a; color: white; }
    .nav-links a.active { background: #1a5f7a; color: white; }
    .nav-user { display: flex; align-items: center; gap: 15px; }
    .nav-user .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #1a5f7a, #57c5b6);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 1.1rem;
    }
    .btn-logout {
      background: #ff6b6b; color: white; border: none; padding: 10px 20px;
      border-radius: 25px; cursor: pointer; font-weight: 500;
      transition: all 0.3s;
    }
    .btn-logout:hover { background: #ee5a5a; }

    /* 主内容 */
    .main-content {
      min-height: 100vh;
      padding: 100px 50px 60px;
    }

    /* 页面标题 */
    .page-header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInUp 0.8s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-header h1 {
      color: white;
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 8px;
      margin-bottom: 12px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .page-header p {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    /* 搜索区域 */
    .search-section {
      max-width: 800px;
      margin: 0 auto 50px;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .search-box {
      display: flex;
      background: rgba(255,255,255,0.98);
      border-radius: 60px;
      padding: 6px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    }
    .search-box input {
      flex: 1;
      border: none; outline: none;
      padding: 18px 28px;
      font-size: 16px;
      border-radius: 60px;
      background: transparent;
    }
    .search-box button {
      background: linear-gradient(135deg, #1a5f7a, #57c5b6);
      color: white; border: none;
      padding: 16px 36px;
      font-size: 15px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }
    .search-box button:hover { transform: scale(1.05); }

    /* 热门城市 */
    .hot-cities {
      max-width: 900px;
      margin: 0 auto 50px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .hot-cities h2 {
      color: white;
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 2px 15px rgba(0,0,0,0.3);
    }
    .cities-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .city-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 12px 24px;
      text-align: center;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
      font-weight: 500;
    }
    .city-card:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-3px);
    }

    /* 搜索结果 */
    .search-result {
      max-width: 1200px;
      margin: 0 auto;
      display: none;
    }
    .search-result.active { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 35px;
    }
    .result-header h2 {
      color: white;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-shadow: 0 2px 15px rgba(0,0,0,0.3);
    }
    .result-header .badge {
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .scenic-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .scenic-card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      text-decoration: none;
      color: inherit;
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
    }
    .scenic-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .scenic-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .scenic-info {
      padding: 20px;
    }
    .scenic-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .scenic-score {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: #ff6b6b;
      background: #fff0f0;
      padding: 4px 12px;
      border-radius: 15px;
      margin-bottom: 10px;
    }
    .scenic-location {
      font-size: 0.9rem;
      color: #1a5f7a;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .scenic-intro {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .scenic-time {
      font-size: 0.85rem;
      color: #57c5b6;
      margin-top: 12px;
      font-weight: 500;
    }

    /* 加载和错误状态 */
    .loading {
      text-align: center;
      padding: 40px;
      color: white;
      font-size: 1.2rem;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 40px;
      color: #ff6b6b;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .top-nav { padding: 12px 20px; }
      .nav-brand { font-size: 1.3rem; }
      .nav-links a { padding: 8px 12px; font-size: 0.85rem; }
      .main-content { padding: 90px 20px 40px; }
      .page-header h1 { font-size: 2rem; letter-spacing: 4px; }
      .scenic-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <a href="/" class="nav-brand">Travel</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/scenic/" class="active">旅游推荐</a>
      <a href="/hotel/">酒店推荐</a>
      <a href="/trip/">行程规划</a>
      <a href="/ticket/">交通票务</a>
      {% if user_id %}
        <div class="nav-user">
          <div class="avatar">{{ username|slice:":1" }}</div>
          <span>{{ username }}</span>
          <a href="/profile/">个人中心</a>
          <button class="btn-logout" onclick="logout()">退出</button>
        </div>
      {% else %}
        <a href="/login/">登录</a>
        <a href="/sign/" style="background: #1a5f7a; color: white;">注册</a>
      {% endif %}
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="main-content">
    <!-- 页面标题 -->
    <div class="page-header">
      <h1>探索热门景点</h1>
      <p>发现最美的风景</p>
    </div>

    <!-- 搜索框 -->
    <div class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入城市名称，搜索热门景点" autocomplete="off">
        <button id="searchBtn">搜索</button>
      </div>
    </div>

    <!-- 热门城市 -->
    <div class="hot-cities" id="hotCities">
      <h2>热门城市</h2>
      <div class="cities-grid" id="citiesGrid"></div>
    </div>

    <!-- 加载状态 -->
    <div class="loading" id="loading" style="display: none;">
      <div class="spinner"></div>
      <p>正在搜索...</p>
    </div>

    <!-- 错误提示 -->
    <div class="error-msg" id="errorMsg" style="display: none;"></div>

    <!-- 搜索结果 -->
    <div class="search-result" id="searchResult">
      <div class="result-header">
        <h2 id="resultTitle">搜索结果</h2>
        <span class="badge" id="resultCount">0 个景点</span>
      </div>
      <div class="scenic-list" id="scenicList"></div>
    </div>
  </div>

  <script>
    const cities = {{ cities|safe }};

    const citiesGrid = document.getElementById('citiesGrid');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResult = document.getElementById('searchResult');
    const resultTitle = document.getElementById('resultTitle');
    const resultCount = document.getElementById('resultCount');
    const scenicList = document.getElementById('scenicList');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const hotCities = document.getElementById('hotCities');

    // 渲染热门城市
    cities.forEach(city => {
      const card = document.createElement('div');
      card.className = 'city-card';
      card.textContent = city;
      card.addEventListener('click', () => {
        searchInput.value = city;
        search();
      });
      citiesGrid.appendChild(card);
    });

    function search() {
      const keyword = searchInput.value.trim();
      if (!keyword) return;

      searchResult.classList.remove('active');
      hotCities.style.display = 'none';
      loading.style.display = 'block';
      errorMsg.style.display = 'none';

      fetch(`/search/?city=${encodeURIComponent(keyword)}`)
        .then(res => res.json())
        .then(data => {
          loading.style.display = 'none';

          if (data.message === '1' && data.scenics && data.scenics.length > 0) {
            resultTitle.textContent = `「${keyword}」热门景点`;
            resultCount.textContent = `${data.scenics.length} 个景点`;
            scenicList.innerHTML = data.scenics.map(s => `
              <a href="/sz/?name=${encodeURIComponent(s.name)}" class="scenic-card">
                <img src="${s.pic_url}" alt="${s.name}" onerror="this.src='https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&q=80'">
                <div class="scenic-info">
                  <div class="scenic-name">${s.name}</div>
                  <div class="scenic-score">⭐ ${s.score}分</div>
                  <div class="scenic-location">${s.province || ''}${s.city ? ' · ' + s.city : ''}</div>
                  <div class="scenic-intro">${s.intro || '暂无详细介绍，点击查看更多景点信息。'}</div>
                  ${s.open_time ? `<div class="scenic-time">🕐 ${s.open_time}</div>` : ''}
                </div>
              </a>
            `).join('');
            searchResult.classList.add('active');
          } else {
            errorMsg.textContent = `未找到「${keyword}」的相关景点`;
            errorMsg.style.display = 'block';
          }
        })
        .catch(err => {
          loading.style.display = 'none';
          errorMsg.textContent = '搜索失败，请稍后重试';
          errorMsg.style.display = 'block';
        });
    }

    searchBtn.addEventListener('click', search);
    searchInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') search();
    });

    function logout() {
      window.location.href = '/logout/';
    }
  </script>
</body>
</html>
